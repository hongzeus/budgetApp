name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test and quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests with 100 percent coverage gate
        run: python -m pytest --cov=budget --cov-report=term-missing --cov-fail-under=100

      - name: Report cyclomatic complexity
        run: python -m radon cc budget -s

      - name: Enforce cyclomatic complexity grade B or better
        run: python -m xenon --max-absolute B --max-modules B --max-average B budget

      - name: Run style checks
        run: python -m flake8 budget tests
